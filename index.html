n\n---\n\n# 2. ตั้งโปรเจค + อัปโหลดรูป\n\n- ดาวน์โหลด **Google Flow** → ล็อกอิน → สร้าง **โปรเจคใหม่**\n- กด **อัปโหลด** → เลือกรูปที่เตรียมไว้ทั้งหมด → กดเสร็จสิ้น → รอระบบอัปขึ้นโปรเจค\n\n---\n\n# 3. สร้าง Storyboard (ขั้นตอนการทำสินค้า)\n\n- คัดลอก **Prompt ที่ 1** → ใน Flow กด **เครื่องหมายบวก → คลัง → เลือกรูปหมูยอ** (เพิ่มภาพได้สูงสุด **10 องค์ประกอบ**)\n- วาง prompt แล้วแก้ชื่อสินค้าเป็น \"หมูยอ\" — ใจความ prompt: *ขอ storyboard ที่มี **9 รูปพร้อมหมายเลขกำกับ** แสดงขั้นตอนทำ บรรยากาศสไตล์ไทย แนวตื่นเต้น ภาพสมจริง*\n- ตั้งค่า: หมวด **รูปภาพ · 16:9 · โหมด Banana Pro** (โหมดนี้ **ทำรูปไม่เสียเครดิต**) → กดส่ง\n\n---\n\n# 4. แปลง Storyboard เป็นวิดีโอ\n\n- คัดลอก **Prompt ที่ 2 (สร้างวิดีโอจาก storyboard)** → กดบวก → คลัง → เลือกภาพ storyboard → วาง prompt (อย่าลืมแก้ชื่อสินค้า)\n- คลิปปักตะกร้าต้องเป็น **แนวตั้ง 9:16**\n- โมเดล: เลือก **VO 3.1 fast = 10 เครดิต/คลิป** (อย่าใช้ **Omniflash** เพราะกินเครดิตเยอะ) → ส่ง → ได้คลิปขั้นตอนการทำ\n\n---\n\n# 5. สร้างภาพ + วิดีโอ \"นายแบบถือสินค้า\" ชวนซื้อ\n\n- **สร้างภาพถือสินค้า:** Prompt สร้างภาพ → เลือก **รูปตัวเอง + รูปสินค้า** → prompt ตัวอย่าง: *\"นั่งอยู่หน้าบ้านไม้กลางทุ่งนา มือขวาถือสินค้าจากรูปที่ 2 เห็นสินค้าชัดเจน แสงแดดยามเช้า มุมใกล้หน้าตรง\"* → โหมดรูปภาพ **9:16 · Banana Pro** → ส่ง\n- **สร้างวิดีโอชวนซื้อ:** เลือกภาพที่เพิ่งสร้าง → prompt สำคัญคือ *\"ให้มือยื่นสินค้ามาด้านหน้าก่อน แล้วค่อยพูด\"* ตามด้วยประโยคขาย **\"หมูยอกินกับอะไรก็อร่อย กดสั่งซื้อได้เลยจ้า\"** + ใส่เสียงลม/เสียงนก → VO 3.1 fast → ส่ง\n\n---\n\n# 6. แก้ปัญหาสินค้า/โลโก้ไม่ตรง (ต้องใช้ Omni Flash)\n\n- ถ้า AI ทำสินค้าหรือโลโก้เพี้ยน → **ต้องสลับโมเดลเป็น Omni Flash ก่อน** (จาก VO 3.1 → Flash)\n- เปิดวิดีโอที่มีปัญหา → กด **แก้ไข** → เลือก omni flash → กดบวก → คลัง → เลือกรูปสินค้า → วาง **Prompt สุดท้าย** ใจความ: *\"ให้เอารูปที่ 2 เข้าไปแทนสินค้าที่ถืออยู่ในมือ\"* → ส่ง → ได้คลิปที่แบรนด์/สินค้าตรงปก\n\n---\n\n# 7. ดาวน์โหลด + ตัดต่อรวมคลิป\n\n- ดาวน์โหลดทั้ง **2 วิดีโอ** (คลิปขั้นตอนทำ + คลิปชวนซื้อ): กด **จุด 3 จุด → ดาวน์โหลด**\n- ตัดต่อด้วยแอปฟรี **Edit จาก Meta** (หรือ CapCut ตามถนัด) → เลือก 2 คลิปมาต่อกัน → ได้คลิปยาว **~16 วินาที**\n- ส่งออกได้สูงสุด **4K** (คลิปนี้เลือก 2K) → ดาวน์โหลดเก็บ หรือโพสต์ตรงไป **Instagram / Facebook**\n\n---\n\n# สรุป Takeaways หลัก\n\n| ประเด็น | ข้อสรุป/คำแนะนำ |\n| --- | --- |\n| เครื่องมือ | Google Flow บนมือถือ (Android) + แอปตัดต่อ Edit by Meta — ฟรีทั้งคู่ |\n| งบเครดิต | ฟรีวันละ **50 เครดิต** · ทำคลิปทั้งหมดนี้ใช้แค่ ~20 เครดิต |\n| โมเดลไหนใช้ตอนไหน | **Banana Pro** = ทำรูป (ไม่เสียเครดิต) · **VO 3.1 fast** = ทำวิดีโอ (10 เครดิต) · **Omni Flash** = ใช้แก้สินค้า/โลโก้เพี้ยนเท่านั้น (กินเครดิต) |\n| 4 พรอมต์หลัก | (1) สร้าง storyboard 9 รูป → (2) storyboard เป็นวิดีโอ → (3) ภาพคนถือสินค้า → (4) วิดีโอชวนซื้อ + พรอมต์สำรองไว้แก้ของไม่ตรงปก |\n| สัดส่วนภาพ | Storyboard ทำ 16:9 · คลิปปักตะกร้าทำ **แนวตั้ง 9:16** |\n| เทคนิคขายให้เนียน | สั่งให้ \"ยื่นสินค้ามาก่อน แล้วค่อยพูด\" ประโยคขาย + ใส่เสียงบรรยากาศ ทำให้คลิปดูเป็นธรรมชาติ |"},{"id":"การเงิน-การลงทุน/2026-06-21_Jitta-Passive-Income-41666-ตลอดชีวิต","category":"การเงิน-การลงทุน","categoryEmoji":"💰","date":"2026-06-21","title":"อายุ 40 ยังทัน! สูตร Passive Income ฿41,666/เดือนตลอดชีวิต (DCA Global ETF + กฎถอน 5%)","channel":"Jitta Wealth","duration":"15:11","presenter":"ทีม Jitta","url":"https://www.youtube.com/watch?v=wjh8HTUNuwI","videoId":"wjh8HTUNuwI","thumb":"https://i.ytimg.com/vi/wjh8HTUNuwI/hqdefault.jpg","markdown":"# 1. โจทย์: อายุ 40 จะมี 10 ล้านตอนเกษียณ + Passive Income ตลอดชีวิตได้ยังไง\n\nเป้าหมายของคลิปคือวางแผนให้คนอายุ ~40 ปี ไปถึงสภาพการเงินแบบนี้เมื่ออายุ ~60:\n\n- มีเงินก้อน **10 ล้านบาท** ตอนเกษียณ\n- หลังเกษียณยังมี **passive income ใช้ได้ตลอดชีวิต เงินต้นไม่มีวันหมด**\n- เมื่อจากไป ยังเหลือ **ทรัพย์สินส่งต่อเป็นมรดกให้ลูกหลาน** ได้\n\n---\n\n# 2. สองทางไปสู่ 10 ล้าน: \"เก็บเงินอย่างเดียว\" vs \"เก็บ + ลงทุน\"\n\n| วิธี | ต้องเก็บต่อเดือน | ระยะเวลา | แรงที่ใช้ |\n| --- | --- | --- | --- |\n| **เก็บเงินเฉยๆ** | ~**41,666 บาท/เดือน** | 20 ปี | แรงเราคนเดียว เหนื่อยมาก |\n| **เก็บ + ลงทุน Global ETF (8%/ปี)** | ~**15,000 บาท/เดือน** | ~22 ปี (อายุ ~62) | แรงเรา + แรงดอกเบี้ยทบต้น |\n| **เก็บ + ลงทุน (อยากครบใน 20 ปี)** | ~**17,000 บาท/เดือน** | 20 ปี (อายุ 60) | แรงเรา + แรงดอกเบี้ยทบต้น |\n\nประเด็นหลัก: เก็บเงินอย่างเดียว = ใช้ \"แรงเรา\" ดึงเงินก้อนเดียว เงินไม่ได้ทำงานเลย จึงต้องเก็บก้อนใหญ่ถึงเดือนละ 41,666 บาท แต่พอเอาเงินไปลงทุนให้ได้ผลตอบแทนทบต้น ~8%/ปี ภาระต่อเดือนเหลือแค่ ~15,000–17,000 บาท — เบาลงมหาศาลและ \"เป็นไปได้จริง\"\n\n> ผู้บรรยายชี้ว่าหลายคนถ้าลองทำงบรายเดือนดู จะพบว่าเงินที่ใช้จ่ายกับของไม่จำเป็นต่อเดือน อาจมากกว่า 15,000–17,000 บาทที่ควรกันไว้วางแผนเกษียณด้วยซ้ำ\n\n---\n\n# 3. ทำไมต้องเป็น Global ETF (ไม่ใช่หุ้นตัวเดียว/ประเทศเดียว)\n\n- เป็นพอร์ตที่ **กระจายความเสี่ยงทั่วโลก** — ลงทั้ง **หุ้นทั่วโลก** และ **พันธบัตร/หุ้นกู้บริษัทเอกชนชั้นดีหลายร้อย–หลายพันบริษัท** ไม่ผูกกับสินทรัพย์เดียวหรือประเทศเดียว\n- มี **ระบบ rebalance อัตโนมัติ**: ตลาดหุ้นลง → ขายพันธบัตรมาซื้อหุ้นเพิ่ม / ตลาดหุ้นขึ้น → ขายหุ้นมาซื้อพันธบัตร เพื่อคุมความเสี่ยงให้สมดุล\n- ดีไซน์มาให้ทนทุกสภาวะ — เวลาตลาดตก \"ดาวน์ไซด์\" ไม่หนักจนเกินที่คนทั่วไปจะถือผ่านไปได้\n- ระยะยาวจึงให้ผลตอบแทนทบต้น **~8% ต่อปี** ตามสถิติและผลตอบแทนจริงที่ผ่านมา\n\n> ตัวอย่างตัวเลข: DCA ~17,000 บาท/เดือน ที่ผลตอบแทน 8%/ปี ผ่านไป 20 ปี พอร์ตโตเป็น ~10 ล้านบาท (อยากได้มากกว่านั้นลองคำนวณเองในฟีเจอร์ **My Future Wealth** ในแอป Jitta) — คนอายุน้อยกว่า 40 อาจ DCA แค่ ~10,000 บาท/เดือน ก็ถึง 10 ล้านได้ในอายุ 60\n\n---\n\n# 4. อยากได้มากกว่า 8%? — จัดพอร์ตแบบ Core–Satellite\n\nถ้าต้องการผลตอบแทนเกิน 8%/ปี (เช่นเริ่มช้า/อยากได้เกิน 10 ล้าน) ใช้โครงสร้าง **Core–Satellite**:\n\n- **Core Port** = Global ETF (กระจายความเสี่ยง, ~8%/ปี) — เป็นฐานของแผน\n- **Satellite Port** = พอร์ตลงทุน **แบบมุ่งเน้น** (ไม่กระจายเท่า Global ETF) เพื่อดันผลตอบแทนรวมให้สูงขึ้น ปรับสัดส่วน Core:Satellite ตามเป้า (อยากได้ 10%, 12%/ปี → สัดส่วนต่างกัน)\n- พอร์ต Satellite ที่แนะนำ: **Jitta Optimix** (ลงกลุ่มเทคโนโลยี/Mega-trend ของโลก) และ **Jitta Ranking Alpha** (ลงทุนแบบ VI เหนือชั้น — เลือกประเทศที่มีโอกาสสูงในแต่ละปี แล้วเลือกหุ้นดีราคาถูกตามหลัก VI)\n\n> คลิปนี้เน้น Global ETF เป็นหลัก เพราะมองว่าแค่ Core 8%/ปี ก็เป็นแผนที่ \"ไม่ว่าเกิดอะไรขึ้นก็ไม่น่าพลาด\" — รายละเอียด Satellite ให้ไปดูคลิปแยก\n\n---\n\n# 5. หัวใจของ Passive Income: \"กฎ 5%\" — ถอนน้อยกว่าที่โต เงินต้นจึงโตต่อ\n\nวิธีดึงเงินออกมาใช้หลังมี 10 ล้านโดยเงินไม่หมด:\n\n- **อย่าถอนออกทั้งหมดแล้วหยุดลงทุน** (แบบทฤษฎีเก่า) — เพราะกลายเป็นเงินฝากธรรมดาที่ลดลงเรื่อยๆ ถ้าอายุยืนกว่าที่เงินจะอยู่ = แย่\n- ให้ **คงเงินใน Global ETF ต่อไป** (ยังโต ~8%/ปี) แล้ว **ถอนออกมาใช้แค่ ~5%/ปี** (ฟีเจอร์ \"กด 5%\" ของ Jitta)\n- โต 8% – ถอน 5% = **เหลือ ~3%/ปี ทบต้นเข้าเงินต้น** → เงินต้นไม่ลด แถมโตขึ้นเรื่อยๆ ดังนั้นเงิน 5% ที่ถอนแต่ละปีก็ค่อยๆ มากขึ้นตามพอร์ต\n\n**ตัวอย่างปีแรก (เงินต้น 10 ล้าน):**\n\n| รายการ | จำนวน |\n| --- | --- |\n| ผลตอบแทน 8%/ปี | ~800,000 บาท |\n| ถอนใช้ 5% | ~500,000 บาท (≈ **41,666 บาท/เดือน**) |\n| เหลือทบเข้าเงินต้น | ~300,000 บาท → เงินต้นปีถัดไป ~10.3 ล้าน |\n\nปีถัดๆ ไปพอร์ตใหญ่ขึ้น 5% ที่ถอนก็มากกว่า 500,000 เรื่อยๆ — **ใช้ได้ไม่มีวันหมดจนกว่าเราจะไม่อยู่**\n\n---\n\n# 6. ส่งต่อมรดก + ทำไมมั่นคงกว่าอสังหา/หุ้นกู้\n\n- วันที่เราจากไป เงินใน Global ETF ที่ทบต้นมานาน **จะมากกว่า 10 ล้าน** ส่งต่อเป็นมรดกให้ลูกหลานได้ ยิ่งอายุยืนยิ่งโต เช่นทบเป็น **20 ล้าน** → ถอน 5% = ~1 ล้าน/ปี ≈ **83,333 บาท/เดือน**\n- **ทำไมมั่นคงกว่าทางอื่น:**\n  - *หุ้นกู้* — ถ้าเจ้าของบริษัททำธุรกิจไม่ดี หุ้นกู้อาจเจ๊ง\n  - *อสังหา/อพาร์ตเมนต์* — ช่วงเฟื่องฟูดี แต่ตัวอย่างเพื่อนผู้บรรยายมีอสังหาหลายแห่งในกรุงเทพฯ พอหลังโควิดนักท่องเที่ยวหาย → เจอ 2 ปัญหาพร้อมกัน: (1) ผู้เช่าน้อยลง ตัดราคาแข่งกัน passive income หด (2) ราคาคอนโดตก จะ liquidate เป็นเงินสดก็ไม่กล้าขาย — และความเสี่ยงยังกระจุกในประเทศไทย\n  - *Global ETF* — อิงเศรษฐกิจทั้งโลก กระจายข้ามประเทศ/สินทรัพย์ บริษัทใดบริษัทหนึ่งเจ๊งก็ไม่กระทบพอร์ตรวม โอกาส \"โตต่อไม่ได้\" จึงน้อยมาก\n- หลักการนี้คือสิ่งที่ **เศรษฐีระดับโลกทำผ่าน Trust Fund** อยู่แล้ว — ลงทุนให้ได้ ~6–8%/ปี แล้วกำหนดให้ถอนได้ ~4–5%/ปี เพื่อให้เงินต้นไม่หายและตระกูลมั่งคั่งต่อเนื่อง\n\n---\n\n# สรุป Takeaways หลัก\n\n| ประเด็น | ข้อสรุป/คำแนะนำ |\n| --- | --- |\n| เป้าหมาย | อายุ 40 → มี 10 ล้านตอน 60 + passive income ตลอดชีวิต + มรดก |\n| วิธีสะสม | DCA ลง Global ETF ~**17,000 บาท/เดือน** (8%/ปี) 20 ปี = ~10 ล้าน (เทียบเก็บเฉยๆ ต้อง 41,666/เดือน) |\n| ทำไม Global ETF | กระจายทั่วโลก (หุ้น+พันธบัตร) + rebalance อัตโนมัติ → ทนทุกสภาวะ ~8%/ปี ระยะยาว |\n| อยากได้ >8% | เพิ่มพอร์ต Satellite (Jitta Optimix / Ranking Alpha) คุมสัดส่วน Core:Satellite ตามเป้า |\n| กฎถอนเงิน \"5%\" | คงเงินไว้ลงทุนต่อ ถอนแค่ 5%/ปี (โต 8% – ถอน 5% = เงินต้นโต +3%/ปี) → ไม่มีวันหมด |\n| ความมั่นคง | มั่นคงกว่าหุ้นกู้/อสังหา (กระจุกความเสี่ยง) — เหมือนหลัก Trust Fund ของเศรษฐีโลก |\n| มรดก | เงินต้นไม่เคยลด ทบต้นโตเกิน 10 ล้าน ส่งต่อลูกหลานให้ถอน 5%/ปี ต่อได้ไม่รู้จบ |\n\n> ⚠️ คลิปนี้เป็นเนื้อหาการตลาดของ Jitta Wealth — ตัวเลข 8%/ปี เป็นค่าเฉลี่ยระยะยาวในอดีต ไม่การันตีอนาคต และการลงทุนมีความเสี่ยง ควรศึกษา/ประเมินความเสี่ยงตนเองก่อนตัดสินใจ"},{"id":"ธุรกิจ-การตลาด/2026-06-20_รันธุรกิจคนเดียวทำเงิน7หลัก","category":"ธุรกิจ-การตลาด","categoryEmoji":"📈","date":"2026-06-20","title":"ผมรันธุรกิจนี้คนเดียว แต่ทำเงินได้เดือนละ 7 หลัก — โมเดล e-commerce นำเข้าจีนมาขายไทย","channel":"Putter Lu E-com","duration":"12:45","presenter":"Putter (เจ้าของช่อง)","url":"https://www.youtube.com/watch?v=OngHERwMB3s","videoId":"OngHERwMB3s","thumb":"https://i.ytimg.com/vi/OngHERwMB3s/hqdefault.jpg","markdown":"# 1. ธุรกิจที่ทำคืออะไร — นำเข้าจีนมาขายไทย แล้วทำแบรนด์\n\n- ผู้บรรยายรันธุรกิจ **e-commerce คนเดียว** ทำยอดขายหลักล้านบาท/เดือน\n- โมเดลคือ **นำเข้าสินค้าจากจีนมาขายในไทย** ถ้าชิ้นไหนขายดี/สเกลได้ → ทำเป็นแบรนด์ทันที\n- ขายหลายแพลตฟอร์มพร้อมกัน: Shopify, TikTok, Shopee\n- ตัวเลขที่โชว์ (แบรนด์หลัก): Shopify ~560,000 · TikTok ~420,000 · Shopee ~350,000 บาท/เดือน\n\n---\n\n# 2. ทำไมเลือกเป็น \"ร้านค้าต้นน้ำ\" ไม่ใช่ affiliate/นายหน้า\n\n- บน TikTok การทำ affiliate เริ่มง่ายกว่า ไม่ต้องใช้ทุน — แต่กำไรสู้เจ้าของร้านไม่ได้\n- เพราะร้านค้าต้นน้ำเป็นคน**ตั้งราคา + กำหนดค่าคอม**เอง กำไรส่วนใหญ่จึงเข้ากระเป๋าร้าน\n- TikTok หักค่าคอมสูง (~30%+) จึงค่อย ๆ **ลดสเกลบน TikTok** ลง\n\n---\n\n# 3. Step 1 — หา Winning Product\n\n- เลือกสินค้าที่**คู่แข่งในไทยยังน้อยหรือไม่มี** ยิ่งดี\n- แต่ต้องมี **proof จากต่างประเทศ** ว่าขายได้จริง (เช่น ยอดขาย Amazon / แอดต่างประเทศ)\n- สินค้าที่**ไม่เอา:** ของไวรัลบน TikTok อยู่แล้ว, ของที่คนไทยขายเกลื่อน Shopee\n- ของจากร้านจีนที่เพิ่งมาใหม่ไม่นับเป็นคู่แข่ง เพราะเขาทำตลาดในไทยไม่เป็น\n\n---\n\n# 4. Step 2 — ทดสอบก่อนสต๊อก (ลดความเสี่ยง)\n\n- **ไม่รีบสต๊อกของ** — ทดสอบขายก่อนด้วยการโพสต์คลิปลง **Facebook** เช็กว่ามี volume จริงไหม\n- ภายใน **3–7 วัน** ถ้ากำไรคุ้มค่าแอด → สต๊อกทันที; ถ้าไม่คุ้ม → ปิดแอด ไม่เสียเงินสต๊อก\n- ตัวอย่างทดสอบ 3 ตัว: ตัวที่ขาด ROI ~1.3 เท่า (ขาดทุน → ยกเลิก) · ตัวที่ผ่าน ROI ~3–5 เท่า → สต๊อกเลย\n- จุดเด่น: รู้ผลตั้งแต่วันแรกว่าขายได้ไหม (ต่างจากเปิดร้านอาหารที่ทดลองก่อนไม่ได้)\n\n---\n\n# 5. Step 3 — สเกล + ใช้ Influencer เป็น \"ม้าเร็ว\"\n\n- ของมาถึง → เพิ่มงบแอด ทำตลาดทุกแพลตฟอร์ม (Facebook → TikTok → Shopee)\n- จ้าง influencer รีวิว — เริ่มจ้างแค่ **10 คน** มี 1 คนไวรัล แล้วครีเอเตอร์คนอื่นทยอยเข้ามาเอง\n- เพราะให้**ค่าคอมเหมาะสม + สินค้าแปลกใหม่ไม่มีคู่แข่ง** → ไวรัลง่าย\n- ผล: ครีเอเตอร์ 129 คนทำยอดให้ ~1,700,000 บาท (เดือน 1–6), โพสต์ 370 โพสต์ใน 6 เดือน\n- **Shopee ได้ยอดฟรี**: ลูกค้าเห็นของบน TikTok/FB แล้วไปกดซื้อบน Shopee เพื่อเก็บคอยน์ → ยอด 896,000 บาทโดยยิงแอด 0 บาท\n\n---\n\n# 6. ยอดขายล้านไม่ได้ยากอย่างที่คิด + ระบบอัตโนมัติ\n\n- สินค้าตัวเดียว พ.ค. 2026: ขาย 1,372 ชิ้น → ยอด 1,100,000 บาท · กำไร 600,000 บาท\n- เฉลี่ย**แค่ 44 ชิ้น/วัน** ก็ถึงล้านได้ (ไม่ต้องขายหมื่นชิ้น)\n- รันด้วยระบบ ~100%: ใช้ **Fulfillment** ส่งของ (ไม่แพ็คเอง) + **AI** + พนักงาน 1 คนคีย์ออเดอร์/ทำบัญชี\n- จดบริษัท + จด VAT เสียภาษีทุกเดือน · ใช้ชีวิต slow life อยู่เชียงใหม่ หน้าที่เหลือแค่ดูแอด/วัดผล/หาของใหม่\n\n---\n\n# สรุป Takeaways หลัก\n\n| ประเด็น | ข้อสรุป/คำแนะนำ |\n| --- | --- |\n| โมเดลธุรกิจ | นำเข้าจีน → ขายไทย → ทำแบรนด์ตัวที่ขายดี |\n| เลือกตำแหน่ง | เป็นร้านต้นน้ำ (กำไรกว่า affiliate) |\n| หาสินค้า | คู่แข่งไทยน้อย + มี proof ต่างประเทศ, เลี่ยงของไวรัลซ้ำ ๆ |\n| ลดความเสี่ยง | ทดสอบบน Facebook 3–7 วันก่อนสต๊อก, ดู ROI/BE |\n| ตัวเร่งยอด | influencer ที่ใช่ + ค่าคอมเหมาะสม = ม้าเร็ว |\n| เคล็ดยอดล้าน | หา winning product + influencer ที่ใช่ (แค่ 44 ชิ้น/วัน) |\n| ระบบ | Fulfillment + AI + พนักงาน 1 คน = one-person company |\n\n> หมายเหตุ: ช่วงท้ายคลิปเป็นการขายคอร์ส/community เรียน e-commerce (มีน้องมิน KFM เป็นเจ้าของคอร์ส ผู้บรรยายเป็น mentor)"},{"id":"บันเทิง-ไลฟ์สไตล์/2026-06-20_Insta360-Luna-Ultra","category":"บันเทิง-ไลฟ์สไตล์","categoryEmoji":"🎬","date":"2026-06-20","title":"รีวิว Insta360 Luna Ultra — กล้องคู่ Leica สำหรับสายคอนเทนต์","channel":"spin9","duration":"19:57","presenter":"อุปอิน","url":"https://www.youtube.com/watch?v=5Q6TBRG94ro","videoId":"5Q6TBRG94ro","thumb":"https://i.ytimg.com/vi/5Q6TBRG94ro/hqdefault.jpg","markdown":"# 1. Luna Ultra คืออะไร — คู่แข่ง DJI Pocket 3 จาก Insta360\n\n- กล้อง **กิมบอลในตัว พกพาได้** สไตล์เดียวกับ DJI Pocket 3 ที่ครีเอเตอร์นิยมถือกัน — เป็นคำตอบของ Insta360 ในฟอร์มแฟกเตอร์นี้ที่หลายคนรอ\n- จุดต่างหลัก: ให้มา **2 เลนส์ 2 ระยะ** (ไม่ใช่เลนส์เดียว) เพิ่มความยืดหยุ่นให้ครีเอเตอร์\n- ทั้ง 2 เลนส์เป็น **เลนส์ Leica** — ได้ความคมและคาแรกเตอร์สีแบบ Leica\n\n---\n\n# 2. สเปกกล้อง & เลนส์คู่\n\n| รายการ | รายละเอียด |\n| --- | --- |\n| เซ็นเซอร์ | 1 นิ้ว |\n| ความละเอียด | สูงสุด 8K (ที่ผู้รีวิวถ่ายจริงส่วนใหญ่ 4K) |\n| เลนส์กว้าง | เทียบเท่า ~20 มม. |\n| เลนส์ซูม/เทเล | เทียบเท่า ~60 มม. · ซูม 6 เท่าแบบไม่เสียรายละเอียด |\n| ซูมไกลสุด | 12 เท่า (~240 มม.) แบบ Digital Zoom |\n| วิดีโอ | รองรับ Dolby Vision, 10-bit, ถ่าย Log มาเกรดสีทีหลังได้ |\n\n---\n\n# 3. ดีไซน์ & การควบคุม\n\n- **กิมบอล 3 แกน** กันสั่นได้ทั้งเดินถือ/วิ่งถ่าย ได้ฟุตเทจนิ่ง\n- **จอ OLED 2 นิ้ว** ด้านหลัง แบบสัมผัส ปัดเข้าเมนู/ดูพรีวิว/เปลี่ยนโหมดได้ทุกด้าน · **พลิกจอ** ถ่ายแนวตั้ง/แนวนอนได้\n- **ไฮไลต์เด่นที่ไม่เคยมี: รีโมท/จอถอดแยกได้** — ถอดออกมาคุมกล้องระยะไกล เห็นพรีวิวบนรีโมท เหมาะกับ Solo Creator (ไม่ต้องต่อมือถือ)\n- **2 ปุ่มลัด** ตั้งค่าเองได้ (เช่น สลับหน       : '';
    var meta = [];
    if(s.channel) meta.push('<span>ช่อง <b>'+esc(s.channel)+'</b></span>');
    if(s.duration) meta.push('<span>ความยาว <b>'+esc(s.duration)+'</b></span>');
    if(s.presenter) meta.push('<span>ผู้บรรยาย <b>'+esc(s.presenter)+'</b></span>');
    meta.push('<span><b>'+esc(s.date)+'</b></span>');
    var ytBtn = s.url ? '<a class="yt-link" href="'+esc(s.url)+'" target="_blank" rel="noopener">▶ ดูบน YouTube</a>' : '';
    var bodyHtml = renderMd(s.markdown);

    app.innerHTML = '<div class="detail">'
      + '<button class="back" onclick="history.length>1?history.back():location.hash=\'#/\'">‹ กลับ</button>'
      + player
      + '<div class="dmeta"><span class="badge">'+esc(s.categoryEmoji||'')+' '+esc(s.category)+'</span></div>'
      + '<h1 class="dt">'+esc(s.title)+'</h1>'
      + '<div class="dmeta">'+meta.join('<span class="dot"></span>')+'</div>'
      + ytBtn
      + '<hr class="sep">'
      + '<div class="md-body">'+bodyHtml+'</div>'
      + '</div>';

    // wrap tables for horizontal scroll on mobile
    Array.prototype.forEach.call(app.querySelectorAll('.md-body table'), function(t){
      if(t.parentElement && t.parentElement.classList.contains('tablewrap')) return;
      var w = document.createElement('div'); w.className='tablewrap';
      t.parentNode.insertBefore(w, t); w.appendChild(t);
    });
    // open external links in new tab
    Array.prototype.forEach.call(app.querySelectorAll('.md-body a[href^="http"]'), function(a){
      a.target='_blank'; a.rel='noopener';
    });
    window.scrollTo(0,0);
    document.title = s.title + ' · สรุป YouTube';
  }

  /* ---- search ---- */
  var clearBtn = document.getElementById('clearBtn');
  function onSearch(){
    state.q = qEl.value.trim();
    searchBox.classList.toggle('has-val', !!qEl.value);
    if(!location.hash || location.hash==='#/' || location.hash==='') renderList();
    else { location.hash='#/'; }
  }
  qEl.addEventListener('input', onSearch);
  clearBtn.onclick = function(){ qEl.value=''; onSearch(); qEl.focus(); };

  /* ---- router ---- */
  function route(){
    var h = location.hash || '#/';
    if(h.indexOf('#/')===0 && h.length>2){
      renderDetail(decodeURIComponent(h.slice(2)));
    } else {
      document.title = '📚 สรุปคลิป YouTube';
      renderList();
    }
  }
  window.addEventListener('hashchange', route);

  /* ---- go ---- */
  renderCats();
  route();
})();
</script>
</body>
</html>
